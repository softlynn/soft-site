<!DOCTYPE html>
<html lang="en" style="background-color: #e2e9f3">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#E2E9F3" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("softu-theme-mode");
          var mode = saved === "light" || saved === "dark" ? saved : "light";
          var hash = String(window.location.hash || "");
          var hashPath = hash ? hash.replace(/^#/, "").split("?")[0] : "/";
          var isViewer = /^\/(youtube|cdn|games)\//.test(hashPath || "/");
          if (isViewer) mode = "dark";
          document.documentElement.setAttribute("data-soft-theme", mode);
          document.documentElement.style.backgroundColor = mode === "dark" ? "#0f172a" : "#e2e9f3";
        } catch (e) {}
      })();
    </script>
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.png" or "favicon.png", "%PUBLIC_URL%/favicon.png" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <title>Softu</title>
    <meta name="description" content="Watch Softu's VOD archive with chat replay." />

    <!-- Google / Search Engine Tags -->
    <meta itemprop="name" content="Softu" />
    <meta itemprop="description" content="Watch Softu's VOD archive with chat replay." />
    <meta itemprop="image" content="%PUBLIC_URL%/meta_image.png" />

    <!-- Facebook Meta Tags -->
    <meta property="og:url" content="https://softu.one" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Softu" />
    <meta property="og:description" content="Watch Softu's VOD archive with chat replay." />
    <meta property="og:image" content="%PUBLIC_URL%/meta_image.png" />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Softu" />
    <meta name="twitter:description" content="Watch Softu's VOD archive with chat replay." />
    <meta name="twitter:image" content="%PUBLIC_URL%/meta_image.png" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
