<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>Softu VODs Panel</title>
    <link rel="stylesheet" href="./panel.css" />
    <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
  </head>
  <body data-theme="dark">
    <div class="softu-panel" id="app">
      <header class="softu-header">
        <div class="softu-brand">
          <div class="softu-brand__dot" aria-hidden="true"></div>
          <div>
            <div class="softu-brand__name">softu</div>
            <div class="softu-brand__sub">vod archives with chat replay</div>
          </div>
        </div>
        <a
          class="softu-header__link"
          id="open-archive-link"
          href="https://softu.one/#/vods"
          target="_blank"
          rel="noopener noreferrer"
        >
          Open Archive
        </a>
      </header>

      <main class="softu-content">
        <div class="softu-loading" id="loading-state" role="status" aria-live="polite">
          <div class="softu-loading__orb" aria-hidden="true"></div>
          <span>Loading recent VODs...</span>
        </div>

        <div class="softu-error is-hidden" id="error-state" role="alert"></div>

        <div class="softu-grid is-hidden" id="vod-list" aria-label="Recent VODs"></div>
      </main>
    </div>

    <script src="./panel.js"></script>
  </body>
</html>
